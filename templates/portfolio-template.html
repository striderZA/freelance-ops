<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case Study: {{CLIENT_NAME}} — {{PROJECT_TITLE}}</title>
<style>
  @font-face { font-family: 'Space Grotesk'; src: url('fonts/space-grotesk-latin.woff2') format('woff2'); }
  @font-face { font-family: 'DM Sans'; src: url('fonts/dm-sans-latin.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: 'DM Sans', Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #1a1a1a;
    max-width: 210mm;
    margin: 0 auto;
    padding: 15mm 25mm;
  }
  .header { margin-bottom: 6mm; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22pt; font-weight: 700; color: #111; margin-bottom: 1mm; }
  .subtitle { font-size: 10.5pt; color: #888; }
  h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13pt;
    font-weight: 600;
    color: #222;
    margin-top: 5mm;
    margin-bottom: 2mm;
    padding-bottom: 1mm;
    border-bottom: 1.5pt solid #e0e0e0;
  }
  p { margin-bottom: 2mm; }
  .engagement {
    margin-top: 6mm;
    padding: 3mm 4mm;
    background: #f8f8f8;
    border-radius: 1mm;
    font-size: 10pt;
  }
  .engagement p { margin-bottom: 1mm; }
  .engagement strong { color: #444; }
</style>
</head>
<body>
  <div class="header">
    <h1>Case Study: {{CLIENT_NAME}}</h1>
    <p class="subtitle">{{PROJECT_TITLE}}</p>
  </div>

  <h2>Problem</h2>
  <p>{{PROBLEM}}</p>

  <h2>Approach</h2>
  <p>{{APPROACH}}</p>

  <h2>Results</h2>
  <p>{{RESULTS}}</p>

  <h2>Tech Stack</h2>
  <p>{{TECH_STACK}}</p>

  <div class="engagement">
    <p><strong>Timeline:</strong> {{TIMELINE}}</p>
    <p><strong>Rate:</strong> {{RATE}}</p>
    <p><strong>Platform:</strong> {{PLATFORM}}</p>
  </div>
</body>
</html>
