# Freelance-Ops platform search configuration
# This file is a template — copy to config/platforms.yml and customize.

platforms:
  - name: Upwork
    enabled: true
    max_results: 25
    searches:
      - query: "AI consulting"
        category: "web-mobile-software-dev"
        min_budget: "$75/hr"
      - query: "machine learning"
        category: "data-science-analytics"
        min_budget: "$80/hr"
      - query: "developer"
        min_budget: "$50/hr"

# Search queries feed into scan.mjs and the Upwork provider.
# They should match the niches in your modes/_profile.md.
# Categories are: web-mobile-software-dev, data-science-analytics,
# design-creative, sales-marketing, admin-support, writing-translation,
# customer-support, accounting-consulting
