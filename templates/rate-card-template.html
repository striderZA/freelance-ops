<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rate Card — {{NAME}}</title>
<style>
  @font-face { font-family: 'Space Grotesk'; src: url('fonts/space-grotesk-latin.woff2') format('woff2'); }
  @font-face { font-family: 'DM Sans'; src: url('fonts/dm-sans-latin.woff2') format('woff2'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: 'DM Sans', Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #1a1a1a;
    max-width: 210mm;
    margin: 0 auto;
    padding: 15mm 25mm;
  }
  .header { text-align: center; margin-bottom: 8mm; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22pt; font-weight: 700; margin-bottom: 1mm; }
  .meta { font-size: 10pt; color: #888; }
  h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13pt;
    font-weight: 600;
    margin-top: 6mm;
    margin-bottom: 3mm;
    padding-bottom: 1mm;
    border-bottom: 1.5pt solid #e0e0e0;
  }
  p { margin-bottom: 2mm; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 5mm; }
  th, td { padding: 2.5mm 3mm; text-align: left; border-bottom: 0.5pt solid #ddd; }
  th {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10pt;
    font-weight: 600;
    color: #555;
    border-bottom: 0.5pt solid #999;
  }
  td { font-size: 10.5pt; }
  .footer {
    margin-top: 8mm;
    padding-top: 3mm;
    border-top: 0.5pt solid #ccc;
    font-size: 9.5pt;
    color: #888;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Rate Card — {{NAME}}</h1>
    <p class="meta">{{DATE}}</p>
  </div>

  <h2>Services</h2>
  <table>
    <thead>
      <tr>
        <th>Service</th>
        <th>Rate</th>
        <th>Typical Duration</th>
      </tr>
    </thead>
    <tbody>
      {{#each SERVICES}}
      <tr>
        <td><strong>{{service}}</strong></td>
        <td>{{rate}}</td>
        <td>{{duration}}</td>
      </tr>
      {{/each}}
    </tbody>
  </table>

  <h2>Payment Terms</h2>
  <p>{{TERMS}}</p>

  <h2>Availability</h2>
  <p>{{AVAILABILITY}}</p>

  <div class="footer">
    <p>{{NAME}} · {{EMAIL}} · {{PHONE}}</p>
  </div>
</body>
</html>
