name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: npm install
      - name: Run unit tests
        run: node --test tests/*.test.mjs
      - name: Run full test suite
        run: node test-all.mjs --quick
